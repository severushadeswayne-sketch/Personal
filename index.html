<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML Directory</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800">
  <main class="max-w-4xl mx-auto px-6 py-14">
    <div class="mb-10">
      <p class="text-sm font-medium tracking-[0.2em] uppercase text-slate-500">Directory</p>
      <h1 class="mt-2 text-3xl md:text-4xl font-semibold text-slate-900">HTML Pages</h1>
      <p class="mt-3 text-slate-600 max-w-2xl">
        A single-page button directory for all HTML files in this repository.
      </p>
    </div>

    <section class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
      <div class="px-5 py-4 border-b border-slate-200 flex items-center justify-between gap-4">
        <div>
          <h2 class="text-lg font-semibold text-slate-900">Available Files</h2>
          <p class="text-sm text-slate-500">Direct links only.</p>
        </div>
        <button
          id="refreshBtn"
          class="px-4 py-2 rounded-xl bg-slate-900 text-white text-sm font-medium hover:bg-slate-700 transition"
        >
          Refresh
        </button>
      </div>

      <div id="status" class="px-5 py-4 text-sm text-slate-500">Loading HTML files…</div>
      <div id="fileList" class="p-4 grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
    </section>
  </main>

  <script>
    const owner = "severushadeswayne-sketch";
    const repo = "Personal";
    const branch = "main";
    const rootPath = ""; // optional subfolder, e.g. "pages"

    async function fetchHtmlFiles(path = "") {
      const endpoint = `https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}`;
      const response = await fetch(endpoint);

      if (!response.ok) {
        throw new Error(`GitHub API error: ${response.status}`);
      }

      const items = await response.json();
      let results = [];

      for (const item of items) {
        if (item.type === "file" && item.name.endsWith(".html") && item.name.toLowerCase() !== "index.html") {
          results.push({
            name: item.name,
            path: item.path
          });
        } else if (item.type === "dir") {
          const nested = await fetchHtmlFiles(item.path);
          results = results.concat(nested);
        }
      }

      return results;
    }

    function prettifyName(fileName) {
      return fileName
        .replace(/\.html$/i, "")
        .replace(/[-_]+/g, " ")
        .replace(/\b\w/g, c => c.toUpperCase());
    }

    function renderButtons(files) {
      const status = document.getElementById("status");
      const fileList = document.getElementById("fileList");
      fileList.innerHTML = "";

      if (!files.length) {
        status.textContent = "No HTML files found in this repository.";
        return;
      }

      status.textContent = `${files.length} HTML file${files.length === 1 ? "" : "s"} found.`;

      files
        .sort((a, b) => a.path.localeCompare(b.path))
        .forEach(file => {
          const link = document.createElement("a");
          link.href = `./${file.path}`;
          link.className =
            "block rounded-xl border border-slate-200 bg-slate-50 hover:bg-white hover:border-slate-300 px-4 py-4 transition shadow-sm";
          link.innerHTML = `
            <div class="font-medium text-slate-900">${prettifyName(file.name)}</div>
            <div class="text-sm text-slate-500 mt-1">${file.path}</div>
          `;
          fileList.appendChild(link);
        });
    }

    async function loadDirectory() {
      const status = document.getElementById("status");
      const fileList = document.getElementById("fileList");
      status.textContent = "Loading HTML files…";
      fileList.innerHTML = "";

      try {
        if (owner === "YOUR_GITHUB_USERNAME" || repo === "YOUR_REPOSITORY_NAME") {
          status.innerHTML = 'Update <code>owner</code> and <code>repo</code> in the script first.';
          return;
        }

        const files = await fetchHtmlFiles(rootPath);
        renderButtons(files);
      } catch (error) {
        status.textContent = "Unable to load repository files. Check the repo name, branch, and Pages setup.";
        console.error(error);
      }
    }

    document.getElementById("refreshBtn").addEventListener("click", loadDirectory);
    loadDirectory();
  </script>
</body>
</html>
