<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Protection Plan Index</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{
font-family: 'Inter', sans-serif;
background:#f8fafc;
}
</style>

</head>

<body class="text-gray-800">

<div class="max-w-3xl mx-auto px-6 py-16">

<h1 class="text-2xl font-semibold mb-6 text-gray-900">
Protection Plan
</h1>

<p class="text-gray-600 mb-10">
Below are the sections of the plan. Click any section to open it.
</p>

<div id="fileList" class="space-y-3"></div>

</div>

<script>

const owner = "YOUR_GITHUB_USERNAME";
const repo = "YOUR_REPOSITORY_NAME";
const path = "";

async function loadFiles(){

const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;

const response = await fetch(url);
const files = await response.json();

const container = document.getElementById("fileList");

files
.filter(file => file.name.endsWith(".html") && file.name !== "index.html")
.forEach(file => {

const button = document.createElement("button");

button.className =
"w-full text-left bg-white hover:bg-indigo-50 border border-gray-200 px-5 py-4 rounded-lg shadow-sm transition";

button.innerHTML = `
<span class="font-medium text-gray-900">${file.name.replace(".html","")}</span>
`;

button.onclick = () => {
window.location.href = file.name;
};

container.appendChild(button);

});

}

loadFiles();

</script>

</body>
</html>
